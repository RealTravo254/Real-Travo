<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Google Search Console Verification ✅ -->
    <meta name="google-site-verification" content="EO4sO8y_6D6YuNM9_8pK4ose-v2sB3175LmdY1FYwRU" />

    <!-- Primary Meta Tags -->
    <title>RealTravo | Book Trips, Hotels, Adventures & Hidden Gems</title>
    <meta name="description" content="RealTravo is your ultimate travel booking platform. Discover and book trips, hotels, accommodations, events, experiences, activities, campsites, adventures, and hidden gems worldwide." />
    <meta name="author" content="RealTravo" />
    <meta name="keywords" content="RealTravo, travel booking, trips, hotels, accommodations, adventures, hidden gems, campsites, travel experiences, activities, events, places to visit, traveling, adventure travel, travel partner" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="theme-color" content="#008080" />
    <meta name="rating" content="general" />
    <meta name="revisit-after" content="7 days" />
    <meta name="language" content="English" />
    <meta name="geo.region" content="US" />
    <meta name="geo.placename" content="Worldwide" />

    <!-- Canonical -->
    <link rel="canonical" href="https://www.realtravo.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RealTravo" />
    <meta property="og:title" content="RealTravo | Book Trips, Hotels, Adventures & Hidden Gems" />
    <meta property="og:description" content="RealTravo is your ultimate travel booking platform. Discover and book trips, hotels, accommodations, events, experiences, activities, campsites, adventures, and hidden gems worldwide." />
    <meta property="og:url" content="https://www.realtravo.com/" />
    <meta property="og:image" content="https://www.realtravo.com/fulllogo.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="RealTravo - Book Trips, Hotels, Adventures & Hidden Gems" />
    <meta property="og:locale" content="en_US" />

    <!-- Per-Page SEO: BecomeHost -->
    <meta name="page:become-host:title" content="Become a Host on RealTravo | Start Earning by Hosting Trips, Hotels & Experiences" />
    <meta name="page:become-host:description" content="Start earning by hosting trips, accommodations, campsites, events, adventures, and experiences on RealTravo. Join thousands of hosts and turn your space or expertise into income." />

    <!-- Per-Page SEO: Company -->
    <meta name="page:company:title" content="RealTravo for Companies | Find Your Best Travel Partner" />
    <meta name="page:company:description" content="Partner with RealTravo to offer your customers world-class travel experiences. Find your best traveling partner here." />

    <!-- Per-Page SEO: Auth -->
    <meta name="page:auth:title" content="Login or Sign Up | RealTravo" />
    <meta name="page:auth:description" content="Create your free RealTravo account or log in to book trips, hotels, adventures, and experiences — or manage your hosted listings." />

    <!-- Google Fonts Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RealTravo",
      "alternateName": "Real Travo",
      "url": "https://www.realtravo.com",
      "description": "RealTravo is your ultimate travel booking platform for trips, hotels, accommodations, events, experiences, activities, campsites, adventures, and hidden gems worldwide.",
      "inLanguage": "en-US",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://www.realtravo.com/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "RealTravo",
      "url": "https://www.realtravo.com",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.realtravo.com/fulllogo.png",
        "width": 200,
        "height": 60
      },
      "description": "RealTravo is a travel booking platform for trips, hotels, accommodations, campsites, adventures, hidden gems, events, and experiences.",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer support",
        "availableLanguage": "English"
      },
      "sameAs": [
        "https://www.facebook.com/realtravo",
        "https://www.instagram.com/realtravo",
        "https://www.linkedin.com/company/realtravo"
      ]
    }
    </script>

    <!-- Structured Data: TravelAgency -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "TravelAgency",
      "name": "RealTravo",
      "url": "https://www.realtravo.com",
      "description": "Book trips, hotels, accommodations, events, experiences, activities, campsites, adventures, and hidden gems with RealTravo.",
      "priceRange": "$$",
      "serviceType": [
        "Trip Booking", "Hotel Booking", "Accommodation Booking",
        "Event Booking", "Experience Booking", "Activity Booking",
        "Campsite Booking", "Adventure Travel", "Hidden Gems Discovery"
      ]
    }
    </script>

    <!-- Structured Data: BecomeHost Page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Become a Host | Start Earning on RealTravo",
      "url": "https://www.realtravo.com/become-host",
      "description": "Start earning by hosting trips, hotels, accommodations, campsites, events, and experiences on RealTravo.",
      "isPartOf": { "@type": "WebSite", "url": "https://www.realtravo.com" },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.realtravo.com" },
          { "@type": "ListItem", "position": 2, "name": "Become a Host", "item": "https://www.realtravo.com/become-host" }
        ]
      }
    }
    </script>

    <!-- Structured Data: Company Page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Find Your Best Travel Partner | RealTravo",
      "url": "https://www.realtravo.com/company",
      "description": "Find your best traveling partner with RealTravo. Partner with us to offer world-class travel experiences.",
      "isPartOf": { "@type": "WebSite", "url": "https://www.realtravo.com" },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.realtravo.com" },
          { "@type": "ListItem", "position": 2, "name": "Company", "item": "https://www.realtravo.com/company" }
        ]
      }
    }
    </script>

    <!-- Structured Data: Auth Page -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebPage",
      "name": "Login & Sign Up | RealTravo",
      "url": "https://www.realtravo.com/auth",
      "description": "Log in or create a free RealTravo account to book travel or manage your hosted listings.",
      "isPartOf": { "@type": "WebSite", "url": "https://www.realtravo.com" },
      "breadcrumb": {
        "@type": "BreadcrumbList",
        "itemListElement": [
          { "@type": "ListItem", "position": 1, "name": "Home", "item": "https://www.realtravo.com" },
          { "@type": "ListItem", "position": 2, "name": "Login / Sign Up", "item": "https://www.realtravo.com/auth" }
        ]
      }
    }
    </script>

  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
